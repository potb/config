output:
  - failure

pre-commit:
  parallel: true
  jobs:
    - name: format
      run: nix fmt {staged_files}
      glob: "*.nix"
      stage_fixed: true
      skip_empty: true

    - name: check
      run: nix flake check
      glob: "*.nix"

post-checkout:
  jobs: []

post-commit:
  jobs: []

post-merge:
  jobs: []

pre-push:
  jobs: []
